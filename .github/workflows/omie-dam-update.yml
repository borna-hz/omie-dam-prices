name: OMIE DAM Update

permissions:
  contents: write

concurrency:
  group: omie-dam-update
  cancel-in-progress: false

on:
  workflow_dispatch:
  schedule:
    # Run twice to cover Lisbon DST changes; job exits unless local Lisbon time is 15:30.
    - cron: "30 14 * * *"
    - cron: "30 15 * * *"

jobs:
  update-omie-dam:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Guard Lisbon 15:30
        id: guard
        run: |
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "Manual run detected (${{ github.event_name }}); skipping Lisbon time guard."
            echo "proceed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          NOW_LISBON="$(TZ=Europe/Lisbon date +%H:%M)"
          echo "Lisbon time: ${NOW_LISBON}"
          if [ "${NOW_LISBON}" != "15:30" ]; then
            echo "Skipping: not 15:30 in Europe/Lisbon"
            echo "proceed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "proceed=true" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        if: steps.guard.outputs.proceed == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        if: steps.guard.outputs.proceed == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run OMIE DAM pipeline
        if: steps.guard.outputs.proceed == 'true'
        run: |
          python omie_dam_pipeline.py --start 2023-01-01

      - name: Commit updated data (optional)
        if: steps.guard.outputs.proceed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/omie_dam_prices.parquet data/omie_dam_prices.csv || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Update OMIE DAM prices"
          git push
